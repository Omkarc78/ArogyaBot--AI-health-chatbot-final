<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Access Denied</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#23243a; color:#fff;">
  <div class="container text-center" style="margin-top:10vh;">
    <h1 class="display-4 mb-4">Access Denied</h1>
    <p class="lead">{{ message or "You do not have permission to access this page." }}</p>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-primary mt-4 me-2">Go to Admin Dashboard</a>
    <a href="{{ url_for('logout') }}" class="btn btn-danger mt-4">Logout</a>
  </div>
</body>
</html>
