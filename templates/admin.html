<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f7f8fa !important;
      color: #23243a !important;
    }
    .admin-container {
      position: relative;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 6px 32px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem 2rem 2rem;
      margin-bottom: 2.5rem;
      min-height: 320px;
      color: #23243a;
      border: 1.5px solid #e7eaf3;
    }
    .admin-container h2 {
      color: #23243a;
      font-weight: 800;
      letter-spacing: 0.01em;
      margin-bottom: 2.2rem;
      text-shadow: 0 2px 12px #e7eaf355;
      font-size: 2.1rem;
      border-bottom: 2px solid #e7eaf3;
      padding-bottom: 0.7rem;
      margin-top: 0.2rem;
    }
    .section-heading {
      font-size: 1.25rem;
      font-weight: 700;
      color: #7565FF;
      margin-bottom: 1.2rem;
      margin-top: 0.5rem;
      letter-spacing: 0.01em;
    }
    .search-box {
      max-width: 400px;
      margin: 0 auto 2.5rem auto;
      display: flex;
      gap: 0.5rem;
    }
    .search-box input {
      border-radius: 8px;
      border: 1.5px solid #d6d8e7;
      padding: 0.6rem 1rem;
      font-size: 1.05rem;
      background: #f7f8fa;
      color: #23243a;
      flex: 1;
      transition: border-color 0.2s;
    }
    .search-box input:focus {
      border-color: #7565FF;
      outline: none;
    }
    .search-box button {
      border-radius: 8px;
      background: #7565FF;
      color: #fff;
      border: none;
      font-weight: 600;
      padding: 0.6rem 1.2rem;
      transition: background 0.2s;
    }
    .search-box button:hover {
      background: #5a4dde;
    }
    .info-message {
      color: #e68582;
      font-weight: 600;
      margin-top: 1.5rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <div class="admin-container">
      <h2>Admin Dashboard</h2>
      <div class="section-heading">Search User by User ID</div>
      <form class="search-box" method="GET" action="{{ url_for('admin_dashboard') }}">
        <input type="text" name="user_id" placeholder="Enter User ID" value="{{ request.args.get('user_id', '') }}" required>
        <button type="submit">Search</button>
      </form>
      {% if user %}
        {% include 'admin_update.html' %}
      {% elif request.args.get('user_id') %}
        <div class="info-message">No user found with User ID "{{ request.args.get('user_id') }}".</div>
      {% endif %}
      <a href="{{ url_for('logout') }}" class="btn btn-secondary mt-4">Logout</a>
    </div>
  </div>
</body>
</html>
