<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #2f3045 !important;
      font-family: 'Raleway', sans-serif;
      color: #e5daeb !important;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
    }
    .edit-box {
      background: #23243a !important;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 36px 32px;
      max-width: 420px;
      width: 100%;
      color: #e5daeb !important;
    }
    .edit-box h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: #7565FF;
      text-align: center;
    }
    .form-label {
      font-weight: 500;
      margin-bottom: 4px;
      color: #e5daeb !important;
    }
    .form-control, .form-select, textarea {
      border-radius: 16px;
      margin-bottom: 14px;
      font-size: 0.98rem;
      background: #2f3045 !important;
      color: #e5daeb !important;
      border: 1px solid #7565FF;
    }
    .form-control:focus, .form-select:focus, textarea:focus {
      background: #23243a !important;
      color: #e5daeb !important;
      border-color: #a89cf3;
      box-shadow: 0 0 0 0.2rem rgba(117,101,255,0.15);
    }
    .btn-save {
      background: #7565FF;
      color: #e5daeb !important;
      border: none;
      border-radius: 20px;
      padding: 10px 0;
      width: 100%;
      font-weight: 600;
      font-size: 1.05rem;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .btn-save:hover {
      background: #5a4dde;
      color: #fff !important;
    }
  </style>
</head>
<body>
  <div class="edit-box">
    <h2>Edit {{ 'Basic Info' if section == 'basic' else 'Medical Info' }}</h2>
    <form method="POST" action="{{ url_for('edit_profile', section=section) }}">
      {% if section == 'basic' %}
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control" required value="{{ profile.full_name or '' }}">

        <label class="form-label">Profile Photo URL</label>
        <input type="text" name="profile_photo" class="form-control" value="{{ profile.profile_photo or '' }}" placeholder="static/profiles/yourphoto.jpg">

        <label class="form-label">Age</label>
        <input type="number" name="age" class="form-control" min="0" required value="{{ profile.age or '' }}">
      {% else %}
        <label class="form-label">Height (cm)</label>
        <input type="number" step="0.1" name="height" class="form-control" value="{{ profile.height or '' }}">

        <label class="form-label">Weight (kg)</label>
        <input type="number" step="0.1" name="weight" class="form-control" value="{{ profile.weight or '' }}">

        <label class="form-label">Blood Group</label>
        <input type="text" name="blood_group" class="form-control" value="{{ profile.blood_group or '' }}">

        <label class="form-label">Gender</label>
        <select name="gender" class="form-select">
          <option value="">Select</option>
          <option {% if profile.gender == 'Male' %}selected{% endif %}>Male</option>
          <option {% if profile.gender == 'Female' %}selected{% endif %}>Female</option>
          <option {% if profile.gender == 'Other' %}selected{% endif %}>Other</option>
        </select>

        <label class="form-label">Chronic Conditions</label>
        <textarea name="chronic_conditions" class="form-control" rows="2">{{ profile.chronic_conditions or '' }}</textarea>

        <label class="form-label">Allergies</label>
        <textarea name="allergies" class="form-control" rows="2">{{ profile.allergies or '' }}</textarea>

        <label class="form-label">Additional Notes</label>
        <textarea name="notes" class="form-control" rows="2">{{ profile.notes or '' }}</textarea>
      {% endif %}
      <button type="submit" class="btn btn-save">Save Edits</button>
    </form>
  </div>
</body>
</html>
