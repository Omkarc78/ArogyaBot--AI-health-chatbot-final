<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | NutriScan AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #7565FF;
      --text-color: #FCEEFF;
      --glass-color: rgba(255, 255, 255, 0.1);
    }

    body {
      background-image: url('static/background.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .signup-container {
      max-width: 800px;
      border-radius: 16px;
      background: var(--glass-color);
      backdrop-filter: blur(15px);
      box-shadow: 0 6px 32px rgba(0, 0, 0, 0.15);
      padding: 30px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    }

    .details-section, .form-section {
      flex: 1 1 350px;
      padding: 15px;
    }

    .details-section {
      border-right: 1px solid rgba(255, 255, 255, 0.2);
    }

    .signup-header {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-color);
      margin-bottom: 15px;
      text-align: center;
    }

    .subtext {
      color: var(--text-color);
      font-size: 0.85rem;
      text-align: center;
      line-height: 1.4;
      margin-bottom: 1.2rem;
    }

    .form-label {
      color: var(--text-color);
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.15);
      color: var(--text-color);
      font-size: 0.8rem;
      margin-bottom: 12px;
    }

    .form-control::placeholder {
      color: rgba(252, 238, 255, 0.7);
    }

    .form-control:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 8px rgba(117, 101, 255, 0.3);
      background: rgba(255, 255, 255, 0.25);
      outline: none;
    }

    .btn-signup {
      background-color: var(--primary-color);
      color: var(--text-color);
      border: none;
      border-radius: 30rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 8px;
      width: 100%;
      margin-top: 8px;
    }

    .btn-signup:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(117, 101, 255, 0.3);
    }

    .login-link {
      text-align: center;
      margin-top: 16px;
      font-size: 0.8rem;
      color: var(--text-color);
    }

    .login-link a {
      color: var(--text-color);
      font-weight: 600;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .signup-container {
        flex-direction: column;
        padding: 25px 20px;
      }

      .details-section {
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="container d-flex justify-content-center align-items-center">
    <div class="signup-container">
      
      <!-- Left Section -->
      <div class="details-section">
        <div class="text-center mb-2">
          <div id="lottie-character" style="width:140px; height:140px; margin: 0 auto 60px auto; transform: scale(2);"></div>
        </div>
        <div class="signup-header">Join NutriScan AI</div>
        <div class="text-center mb-2" style="font-size: 1rem; color: var(--text-color);">
          Create Your Account
        </div>
        <p class="subtext">
          Your AI-powered nutrition assistant. Track meals, analyze health trends,
          and unlock smarter eating—all in one place.
        </p>
      </div>

      <!-- Right Section (Signup Form) -->
      <div class="form-section">
        {% if error %}
          <div class="alert alert-danger" role="alert" style="font-size:0.9rem;">
            {{ error }}
          </div>
        {% endif %}
        <form method="POST" action="{{ url_for('signup') }}">
          
          <label class="form-label">Full Name</label>
          <input type="text" name="full_name" class="form-control" placeholder="John Doe" required>

          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="johndoe123" required>

          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control"
                 placeholder="example@gmail.com"
                 pattern="[a-zA-Z0-9._%+-]+@(gmail\.com|yahoo\.com|outlook\.com|hotmail\.com)$"
                 required>

          <label class="form-label">Mobile Number</label>
          <input type="tel" name="mobile" class="form-control" placeholder="+1234567890" required
                 pattern="[+0-9]{10,15}">

          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>

          <button type="submit" class="btn btn-signup">Sign Up</button>

          <p class="login-link">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        </form>
      </div>
    </div>
  </div>

</body>
<!-- LottieFiles CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script>
  lottie.loadAnimation({
    container: document.getElementById('lottie-character'),
    renderer: 'svg',
    loop: true,
    autoplay: true,
    path: 'static/charactor.json'
  });
</script>
</html>
